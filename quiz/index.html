<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CPS630 — Practice Quiz</title>
    <link rel="stylesheet" href="css/atelier.css" />
  </head>
  <body>
    <div class="app-shell">
      <main class="main-stage">
        <div id="view-start">
          <p class="brand-mark">The Academic Atelier</p>
          <h1 class="display-intro">Cognitive sanctuary</h1>
          <p class="lede">
            A focused study session drawn from your course question bank. Choose a section or
            attempt the full set.
          </p>

          <div class="card" style="margin-bottom: 2rem">
            <p class="label-md" style="margin-bottom: 0.75rem">Question bank</p>
            <p id="bank-title" class="title-lg" style="margin-bottom: 0.5rem">Loading…</p>
            <p id="bank-count" class="meta-muted">—</p>
          </div>

          <div class="card" style="margin-bottom: 2rem">
            <label class="label-md" for="section-filter" style="display: block; margin-bottom: 0.75rem"
              >Filter by section</label
            >
            <select id="section-filter" class="field-select">
              <option value="">All sections</option>
            </select>
          </div>

          <div id="stats-panel" class="card stats-panel hidden" style="margin-bottom: 2rem" aria-live="polite">
            <p class="label-md" style="margin-bottom: 0.75rem">Your progress (this browser)</p>
            <div id="stats-summary" class="stats-summary"></div>
            <div id="stats-attempts-wrap" class="stats-attempts-wrap hidden">
              <p class="label-md" style="margin-top: 1.25rem; margin-bottom: 0.5rem">Recent attempts</p>
              <ul id="stats-attempts" class="stats-attempts"></ul>
            </div>
            <div class="btn-row" style="margin-top: 1.25rem; margin-bottom: 0">
              <button type="button" class="btn btn-secondary" id="btn-clear-storage">
                Clear saved progress
              </button>
            </div>
          </div>

          <p id="load-error" class="status-banner bad hidden" role="alert"></p>

          <button type="button" class="btn btn-primary" id="btn-start">Begin</button>
        </div>

        <div id="view-quiz" class="hidden">
          <header class="top-bar" aria-label="Quiz progress">
            <div class="top-bar-inner">
              <div class="brand-row">
                <span class="brand-mark">CPS630</span>
                <span id="progress-meta" class="meta-muted"></span>
              </div>
              <div class="progress-wrap" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
                <div id="progress-fill" class="progress-fill"></div>
              </div>
            </div>
          </header>

          <div class="quiz-body">
            <p id="question-tag" class="label-md" style="margin-bottom: 0.75rem"></p>
            <p id="question-history" class="question-history meta-muted hidden" aria-live="polite"></p>
            <h2 id="question-stem" class="title-lg"></h2>

            <div id="options" class="options"></div>

            <div
              id="feedback"
              class="status-banner hidden"
              role="status"
              aria-live="polite"
            ></div>

            <div class="confidence-row">
              <span class="confidence-label">Confidence</span>
              <button type="button" class="chip" data-level="confident">Confident</button>
              <button type="button" class="chip" data-level="unsure">Unsure</button>
              <button type="button" class="chip" data-level="review">Review</button>
            </div>

            <div class="btn-row">
              <button type="button" class="btn btn-primary" id="btn-next" disabled>Next</button>
            </div>
          </div>
        </div>

        <div id="view-results" class="hidden">
          <p class="brand-mark">Results</p>
          <p id="score-value" class="score-ring"></p>
          <p id="score-summary" class="results-summary"></p>
          <h2 class="title-lg" style="margin-bottom: 1rem">Review misses</h2>
          <div id="review-list"></div>
          <div class="btn-row">
            <button type="button" class="btn btn-primary" id="btn-home">Home</button>
            <button type="button" class="btn btn-secondary" id="btn-restart">Practice again</button>
          </div>
        </div>
      </main>
    </div>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
