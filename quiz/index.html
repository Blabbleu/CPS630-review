<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CPS630 — Home</title>
    <meta http-equiv="refresh" content="0; url=home.html" />
    <link rel="canonical" href="home.html" />
    <script>
      (function () {
        try {
          var k = "cps630-theme";
          var p = localStorage.getItem(k);
          var dark =
            p === "dark" || (p !== "light" && window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.classList.toggle("theme-dark", dark);
          document.documentElement.style.colorScheme = dark ? "dark" : "light";
        } catch (e) {}
      })();
    </script>
    <link rel="stylesheet" href="css/atelier.css" />
  </head>
  <body>
    <p style="font-family: system-ui, sans-serif; padding: 2rem">
      <a href="home.html">Open Home</a> if you are not redirected.
    </p>
  </body>
</html>
